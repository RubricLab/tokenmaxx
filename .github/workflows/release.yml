name: Release

# On every commit to main, release-please maintains a "Release PR" that bumps the
# version and updates the changelog from conventional commits (feat:/fix:/…).
# Merge that PR to cut a release; this same run then publishes to npm via Trusted
# Publishing (OIDC — short-lived token, no NPM_TOKEN, automatic provenance).
# While pre-launch, releases are 0.0.0-alpha.N and publish under the `alpha` tag.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release

      - if: ${{ steps.release.outputs.release_created }}
        uses: actions/checkout@v4
      - if: ${{ steps.release.outputs.release_created }}
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - if: ${{ steps.release.outputs.release_created }}
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      # Trusted publishing needs npm >= 11.5.1; node 22 ships an older one.
      - if: ${{ steps.release.outputs.release_created }}
        run: npm install -g npm@latest
      - if: ${{ steps.release.outputs.release_created }}
        run: bun install --frozen-lockfile
      - if: ${{ steps.release.outputs.release_created }}
        run: bun run build
      - if: ${{ steps.release.outputs.release_created }}
        run: npm publish --tag alpha
